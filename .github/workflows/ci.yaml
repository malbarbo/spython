name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install ruff
        run: pip install ruff

      - uses: denoland/setup-deno@v1
        with:
          deno-version: "2.x"

      - name: Run checks
        run: make check

  wasm:
    name: Build & Test WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-wasip1

      - uses: denoland/setup-deno@v1
        with:
          deno-version: "2.x"

      - name: Install binaryen
        run: sudo apt-get install -y binaryen

      - name: Build & Test
        run: make test-wasm

  test:
    name: Test (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            setup: sudo apt-get install musl-tools

          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            setup: sudo apt-get install musl-tools
            linker: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc

          - os: windows-2022
            target: x86_64-pc-windows-msvc
            setup: git config --global core.longpaths true

          - os: macos-15-intel
            target: x86_64-apple-darwin
            setup: ""

          - os: macos-15
            target: aarch64-apple-darwin
            setup: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Setup
        if: matrix.setup != ''
        run: ${{ matrix.setup }}

      - name: Set linker
        if: matrix.linker != ''
        run: echo "${{ matrix.linker }}" >> $GITHUB_ENV

      - name: Run tests
        run: cargo test --target ${{ matrix.target }}

      - name: Run image tests
        run: cargo test --target ${{ matrix.target }} -- --ignored
